services:
  node:
    build: .
    image: express-bookshelf-realworld
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - 3000:3000
    environment:
      - DB_HOST=postgres
      - DB_PASSWORD=password
      - DB_USER=realworld
      - SECRET=secret
    volumes:
      - .:/home/node/app
      - /home/node/app/node_modules
      - /home/node/app/_coverage

  postgres:
    image: postgres:16.3
    environment:
      - POSTGRES_PASSWORD=password
      - POSTGRES_USER=realworld
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realworld"]
      interval: 5s
      timeout: 5s
      retries: 5
